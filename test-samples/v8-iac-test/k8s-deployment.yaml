# ⚠️ TEST FILE — CodeGuard AI v8.0 IaC Scanner (Kubernetes)
# Every violation below should trigger a CG_IAC_K8S_* finding.
# Open in Windsurf with CodeGuard installed — expect 12+ diagnostics.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: vulnerable-app
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: vulnerable-app
  template:
    metadata:
      labels:
        app: vulnerable-app
    spec:
      # CG_IAC_K8S_001 — hostNetwork: true (shares host network namespace, CIS-K8s 5.2.4)
      hostNetwork: true
      # CG_IAC_K8S_002 — hostPID: true (can see/kill all host processes, CIS-K8s 5.2.2)
      hostPID: true
      # CG_IAC_K8S_003 — automountServiceAccountToken (gives pod API server access)
      automountServiceAccountToken: true

      containers:
        - name: app
          image: myapp:latest       # unpinned image tag

          securityContext:
            # CG_IAC_K8S_004 — privileged: true (full host access, CIS-K8s 5.2.1)
            privileged: true
            # CG_IAC_K8S_005 — runAsUser: 0 (running as root, CIS-K8s 5.2.6)
            runAsUser: 0
            # CG_IAC_K8S_006 — allowPrivilegeEscalation: true
            allowPrivilegeEscalation: true

          # CG_IAC_K8S_007 — dangerous capabilities
          securityContext:
            capabilities:
              add:
                - NET_ADMIN       # full network control
                - SYS_ADMIN       # nearly unrestricted system access
                - ALL             # ALL capabilities — equivalent to root

          # CG_IAC_K8S_008 — plain-value secrets in env (not from secretRef)
          env:
            - name: DATABASE_PASSWORD
              value: "SuperSecret123"
            - name: AWS_SECRET_ACCESS_KEY
              value: "FaKeAwSsEcReTkEyFaKeAwSsEcReT1234"
            - name: OPENAI_API_KEY
              value: "sk-proj-aBcDeFgHiJkLmNoPqRsTuVwXyZ1234"
            - name: JWT_SECRET
              value: "my-hardcoded-jwt-secret"

          ports:
            - containerPort: 3000

          volumeMounts:
            # CG_IAC_K8S_009 — hostPath mount of /etc (read host config files)
            - name: host-etc
              mountPath: /host-etc
            # CG_IAC_K8S_010 — hostPath mount of docker.sock (docker escape to root)
            - name: docker-sock
              mountPath: /var/run/docker.sock

      volumes:
        - name: host-etc
          hostPath:
            path: /etc             # CG_IAC_K8S_009
        - name: docker-sock
          hostPath:
            path: /var/run/docker.sock  # CG_IAC_K8S_010 — container escape vector

---
# CG_IAC_K8S_011 — ClusterRoleBinding with wildcard verbs (over-privileged RBAC)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: over-privileged-role
rules:
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["*"]               # wildcard IAM — any action on any resource

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: over-privileged-binding
subjects:
  - kind: ServiceAccount
    name: default
    namespace: default
roleRef:
  kind: ClusterRole
  name: over-privileged-role
  apiGroup: rbac.authorization.k8s.io
