name: 'CodeGuard AI Security Scan'
description: 'Scan your project for hallucinated packages, vulnerabilities, secrets, and code issues'
author: 'codeguard-ai'

branding:
  icon: 'shield'
  color: 'blue'

inputs:
  path:
    description: 'Project directory to scan'
    required: false
    default: '.'
  format:
    description: 'Output format: table, json, sarif'
    required: false
    default: 'sarif'
  severity:
    description: 'Minimum severity to report: critical, high, medium, low'
    required: false
    default: 'low'
  ignore:
    description: 'Comma-separated list of packages to ignore'
    required: false
    default: ''
  private-scopes:
    description: 'Comma-separated private scoped packages to skip (e.g., @mycompany/)'
    required: false
    default: ''
  fail-on:
    description: 'Fail the action on: critical, high, medium, low, never'
    required: false
    default: 'critical'
  upload-sarif:
    description: 'Upload SARIF results to GitHub Code Scanning'
    required: false
    default: 'true'

outputs:
  findings:
    description: 'Total number of findings'
  critical:
    description: 'Number of critical findings'
  high:
    description: 'Number of high findings'
  hallucinations:
    description: 'Number of hallucinated packages detected'
  sarif-file:
    description: 'Path to SARIF output file'

runs:
  using: 'composite'
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install CodeGuard CLI
      shell: bash
      run: |
        cd ${{ github.action_path }}
        npm ci --production
        npm run build

    - name: Run CodeGuard Scan
      id: scan
      shell: bash
      run: |
        ARGS="scan --path ${{ inputs.path }} --format sarif --severity ${{ inputs.severity }} --no-color"

        if [ -n "${{ inputs.ignore }}" ]; then
          ARGS="$ARGS --ignore ${{ inputs.ignore }}"
        fi

        if [ -n "${{ inputs.private-scopes }}" ]; then
          ARGS="$ARGS --private-scopes ${{ inputs.private-scopes }}"
        fi

        SARIF_FILE="${{ runner.temp }}/codeguard-results.sarif"
        ARGS="$ARGS --output $SARIF_FILE"

        node ${{ github.action_path }}/dist/index.js $ARGS || true

        echo "sarif-file=$SARIF_FILE" >> $GITHUB_OUTPUT

        # Also generate JSON for parsing outputs
        JSON_FILE="${{ runner.temp }}/codeguard-results.json"
        node ${{ github.action_path }}/dist/index.js scan --path ${{ inputs.path }} --format json --severity ${{ inputs.severity }} --no-color --output $JSON_FILE || true

        if [ -f "$JSON_FILE" ]; then
          TOTAL=$(cat $JSON_FILE | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['summary']['totalFindings'])" 2>/dev/null || echo "0")
          CRITICAL=$(cat $JSON_FILE | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['summary']['critical'])" 2>/dev/null || echo "0")
          HIGH=$(cat $JSON_FILE | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['summary']['high'])" 2>/dev/null || echo "0")
          HALL=$(cat $JSON_FILE | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['summary']['hallucinatedPackages'])" 2>/dev/null || echo "0")
          echo "findings=$TOTAL" >> $GITHUB_OUTPUT
          echo "critical=$CRITICAL" >> $GITHUB_OUTPUT
          echo "high=$HIGH" >> $GITHUB_OUTPUT
          echo "hallucinations=$HALL" >> $GITHUB_OUTPUT
        fi

    - name: Upload SARIF to GitHub Code Scanning
      if: inputs.upload-sarif == 'true' && hashFiles(steps.scan.outputs.sarif-file) != ''
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: ${{ steps.scan.outputs.sarif-file }}
        category: codeguard-ai

    - name: Check failure threshold
      shell: bash
      run: |
        FAIL_ON="${{ inputs.fail-on }}"
        CRITICAL="${{ steps.scan.outputs.critical }}"
        HIGH="${{ steps.scan.outputs.high }}"

        if [ "$FAIL_ON" = "never" ]; then
          exit 0
        fi

        if [ "$FAIL_ON" = "critical" ] && [ "${CRITICAL:-0}" -gt 0 ]; then
          echo "::error::CodeGuard AI found $CRITICAL critical finding(s)"
          exit 1
        fi

        if [ "$FAIL_ON" = "high" ]; then
          TOTAL=$((${CRITICAL:-0} + ${HIGH:-0}))
          if [ "$TOTAL" -gt 0 ]; then
            echo "::error::CodeGuard AI found $TOTAL critical/high finding(s)"
            exit 1
          fi
        fi
